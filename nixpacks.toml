[phases.setup]
nixPkgs = ["python311", "nodejs_20"]

[phases.install]
cmds = ["python -m venv /opt/venv && . /opt/venv/bin/activate && pip install --no-cache-dir -r backend/requirements.txt"]

[start]
cmd = ". /opt/venv/bin/activate && cd backend && uvicorn main:app --host 0.0.0.0 --port ${PORT:-8000}"
